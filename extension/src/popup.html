<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bili Download</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Bili Download</h1>
          <p id="status">检查当前页面...</p>
        </div>
      </header>

      <section class="panel">
        <label for="bvid">BV 号</label>
        <div class="field-row">
          <input id="bvid" type="text" readonly>
          <button id="copy" type="button">复制</button>
        </div>

        <label for="title">标题</label>
        <input id="title" type="text" readonly>
      </section>

      <button id="send" class="primary" type="button">发送到本地下载器</button>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
