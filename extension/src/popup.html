<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bili Download</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Bili Download</h1>
          <p id="status">&#26816;&#26597;&#24403;&#21069;&#39029;&#38754;...</p>
        </div>
      </header>

      <section class="panel">
        <div class="account-row">
          <span>Cookie</span>
          <strong id="account">&#26816;&#26597;&#20013;...</strong>
        </div>

        <label for="bvid">BV &#21495;</label>
        <div class="field-row">
          <input id="bvid" type="text" readonly>
          <button id="copy" type="button">&#22797;&#21046;</button>
        </div>

        <label for="title">&#26631;&#39064;</label>
        <input id="title" type="text" readonly>

        <label for="quality">&#28165;&#26224;&#24230;</label>
        <select id="quality"></select>
      </section>

      <section id="progress" class="progress-panel" hidden>
        <div class="progress-head">
          <span>&#19979;&#36733;&#36827;&#24230;</span>
          <strong id="progress-percent">0%</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar"></div>
        </div>
        <div class="progress-stats">
          <span id="progress-size">0 B / --</span>
          <span id="progress-speed">--/s</span>
        </div>
        <div id="download-controls" class="progress-actions" hidden>
          <button id="pause" type="button">&#26242;&#20572;</button>
          <button id="cancel" class="danger" type="button">&#21462;&#28040;</button>
        </div>
      </section>

      <button id="download" class="primary" type="button">&#19979;&#36733;</button>
      <button id="page-picker-toggle" class="secondary" type="button" hidden>&#36873;&#25321;&#20998; P</button>
      <section id="page-picker" class="page-picker" hidden>
        <div class="page-picker-head">
          <span>&#20998; P &#21015;&#34920;</span>
          <button id="page-select-all" type="button">&#20840;&#36873;</button>
        </div>
        <div id="page-list" class="page-list"></div>
        <button id="download-selected-pages" class="secondary" type="button">&#19979;&#36733;&#36873;&#20013;&#20998; P</button>
      </section>
      <button id="diagnostic" class="secondary" type="button">&#22797;&#21046;&#35786;&#26029;</button>
      <p class="note">&#24050;&#20351;&#29992;&#27983;&#35272;&#22120; Cookie &#35835;&#21462;&#28165;&#26224;&#24230;&#65307;DASH &#28165;&#26224;&#24230;&#20250;&#22312;&#27983;&#35272;&#22120;&#20869;&#21512;&#24182;&#20026; MP4&#12290;</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
